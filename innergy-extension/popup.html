<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innergy Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0d0d0d;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 0;
    }

    /* ── Header ── */
    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 14px 16px 12px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .app-name {
      font-size: 11px;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .version {
      font-size: 10px;
      color: #333;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      color: #e5e5e5;
      letter-spacing: -0.2px;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    .dot-green { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot-red   { background: #ef4444; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .status-text {
      font-size: 12px;
      font-weight: 600;
    }
    .status-text-recording { color: #22c55e; }
    .status-text-paused    { color: #ef4444; }
    .status-sub {
      margin-left: auto;
      font-size: 10px;
      color: #444;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
    }
    .stat-box {
      background: #0d0d0d;
      padding: 12px 14px;
    }
    .stat-box:first-child {
      border-right: 1px solid #1a1a1a;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f59e0b;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 9px;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Sync row ── */
    .sync-row {
      padding: 8px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-icon { color: #333; font-size: 12px; }
    .sync-text { font-size: 10px; color: #444; }
    .sync-time { color: #555; margin-left: 2px; }

    /* ── Buttons ── */
    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
      border-radius: 8px;
      border: none;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: #f59e0b;
      color: #000;
    }
    .btn-danger {
      background: #1a0a0a;
      color: #ef4444;
      border: 1.5px solid #450a0a;
    }
    .btn-icon { font-size: 15px; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 12px;
      font-size: 9px;
      color: #333;
      text-align: center;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="app-name">Sawdust Studio</span>
      <span class="version">v1.0</span>
    </div>
    <div class="title">Innergy Agent</div>
  </div>

  <div class="status-row">
    <div class="dot dot-green" id="statusDot"></div>
    <span class="status-text status-text-recording" id="statusText">Recording</span>
    <span class="status-sub" id="statusSub">session active</span>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-value" id="eventCount">0</div>
      <div class="stat-label">Events this session</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="queueCount">0</div>
      <div class="stat-label">Queued (unsent)</div>
    </div>
  </div>

  <div class="sync-row">
    <span class="sync-icon">↑</span>
    <span class="sync-text">Last sync: <span class="sync-time" id="lastSync">never</span></span>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="toggleBtn">
      <span class="btn-icon" id="toggleIcon">⏸</span>
      <span id="toggleLabel">Pause Recording</span>
    </button>
    <button class="btn btn-danger" id="clearBtn">
      <span class="btn-icon">🗑</span>
      <span>Clear Session Data</span>
    </button>
  </div>

  <div class="footer">
    Monitoring app.innergy.com · Supabase innergy_sessions
  </div>

  <script src="popup.js"></script>
</body>
</html>
