<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sawdust Studio — Shop Supervisor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e5e5e5;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
#root{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
input,select,textarea{
  font-family:'DM Mono','Courier New',monospace;font-size:13px;
  background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;
  color:#e5e5e5;padding:8px 12px;width:100%;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.12)}
select option{background:#1a1a1a;color:#e5e5e5}
textarea{resize:vertical}
button{
  font-family:'DM Mono','Courier New',monospace;font-size:11px;cursor:pointer;
  border-radius:6px;border:1px solid #2a2a2a;background:transparent;
  color:#aaa;padding:7px 14px;letter-spacing:.05em;
  transition:background .1s,color .1s,border-color .1s;
}
button:hover{background:#1a1a1a;color:#e5e5e5}
.bp{background:#f59e0b;color:#1a0900;border-color:#f59e0b;font-weight:500}
.bp:hover{background:#d97706;border-color:#d97706;color:#0d0500}
.bd{color:#f87171;border-color:#7f1d1d}.bd:hover{background:#2e1a1a}
.bg{color:#4ade80;border-color:#14532d}.bg:hover{background:#1a2e1a}
.chk{
  width:18px;height:18px;min-width:18px;border:1px solid #333;border-radius:4px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:11px;background:#141414;transition:all .15s;flex-shrink:0;
}
.chk.on{background:#22c55e;border-color:#22c55e;color:#061206;font-weight:500}
/* message bubbles */
.bubble-in{background:#2a2a2a;border-radius:0 14px 14px 14px;padding:9px 14px;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word}
.bubble-out{background:#f59e0b;border-radius:14px 0 14px 14px;padding:9px 14px;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#22c55e;color:#0a1f0a;border-radius:8px;padding:12px 22px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none;font-family:'DM Mono','Courier New',monospace}
</style>
</head>
<body>
<div id="root"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
// ── Supabase client ───────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://suwadpgtqifwufmlwhpk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2FkcGd0cWlmd3VmbWx3aHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODIxMzQsImV4cCI6MjA5MTg1ODEzNH0.iVC__gcDTj4nF8JpwfdWRElUDrFGhI0HNGcpoU4vmoI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect, useRef } = React;
const h = React.createElement;

// ── localStorage keys (supervisor-only data) ──────────────────────────────────
const K = { j:"ssj6", c:"ssc6", sd:"sssd3", inv:"ssinv3" };

// ── Constants ─────────────────────────────────────────────────────────────────
const CL = [
  { id:"dm", label:"Dimensions match shop drawings" },
  { id:"sq", label:"Cabinet is square / plumb" },
  { id:"eb", label:"Edge banding flush and clean" },
  { id:"hw", label:"Hardware locations correct" },
  { id:"cu", label:"Cut quality — no tearout or chipping" },
  { id:"rv", label:"Door / drawer reveal consistent" },
  { id:"lb", label:"Part labeling correct" },
  { id:"df", label:"No visible surface defects" },
  { id:"jt", label:"Joints tight / fasteners set" },
];
const CTYPES = ["Base cabinet","Upper cabinet","Tall cabinet","Island","Drawer box","Door","Custom"];
const STAGES = ["Cutting","Edgebanding","Assembly","Finishing","Shipping","Install"];
const UNITS  = ["sheets","pcs","lbs","ft","rolls","boxes","gallons"];
const AM = "#f59e0b";
const SM = {
  active:  { bar:"#3b82f6", bg:"#1e2a3a", txt:"#60a5fa" },
  passed:  { bar:"#22c55e", bg:"#1a2e1a", txt:"#4ade80" },
  flagged: { bar:"#ef4444", bg:"#2e1a1a", txt:"#f87171" },
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid   = () => Date.now() + "_" + Math.random().toString(36).slice(2,5);
const fmtD  = iso => new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtDT = iso => fmtD(iso) + " " + new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const today = () => new Date().toISOString().slice(0,10);
const dimStr = p => [p.width,p.height,p.depth].filter(v => v && v.trim()).join(" x ");

// localStorage (supervisor-local tables only)
const load = (k, d=[]) => { try { const v=localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const sv   = (k, v)    => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// Shared styles
const CS  = { background:"#141414", border:"1px solid #222", borderRadius:6, padding:"12px 16px", marginBottom:8 };
const CS2 = { background:"#111",    border:"1px solid #222", borderRadius:6, padding:"14px 16px", marginBottom:10 };
const IS  = { fontSize:13, fontFamily:"'DM Mono','Courier New',monospace", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:6, color:"#e5e5e5", padding:"8px 12px", width:"100%", outline:"none" };

// ── Mini components ───────────────────────────────────────────────────────────
const Badge = ({s}) => {
  const m = SM[s] || SM.active;
  return h("span",{style:{background:m.bg,color:m.txt,fontSize:10,padding:"2px 9px",borderRadius:99,border:`1px solid ${m.bar}50`,fontWeight:500,letterSpacing:".04em"}},s);
};
const Stat = ({label,val,color}) =>
  h("div",{style:{background:"#141414",borderRadius:6,padding:"14px 16px",borderTop:`3px solid ${color}`}},
    h("div",{style:{fontSize:28,fontWeight:500,color}}, val),
    h("div",{style:{fontSize:10,color:"#555",marginTop:4,letterSpacing:".07em"}}, label)
  );
const Pill = ({label,color}) =>
  h("span",{style:{fontSize:10,background:color+"20",color,padding:"2px 9px",borderRadius:99,border:`1px solid ${color}40`,whiteSpace:"nowrap",letterSpacing:".04em"}}, label);
const Divider = ({label}) =>
  h("div",{style:{display:"flex",alignItems:"center",gap:10,margin:"20px 0 12px"}},
    h("div",{style:{height:1,flex:1,background:"#1e1e1e"}}),
    h("span",{style:{fontSize:10,color:"#444",letterSpacing:".1em",whiteSpace:"nowrap"}}, label),
    h("div",{style:{height:1,flex:1,background:"#1e1e1e"}})
  );
const Empty = ({msg}) =>
  h("div",{style:{textAlign:"center",padding:"64px 0",color:"#333",fontSize:13}}, msg);
const FBtn = ({val,cur,set}) =>
  h("button",{onClick:()=>set(val),style:{fontSize:11,padding:"5px 12px",background:cur===val?"#1a1a1a":"transparent",color:cur===val?"#e5e5e5":"#555",borderColor:cur===val?"#333":"#1e1e1e"}}, val);
const StatusDot = ({ok}) =>
  h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:ok?"#22c55e":"#ef4444",marginRight:6}});

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("dashboard");

  // ── Supervisor-local state (localStorage) ──────────────────────────────────
  const [jobs,      setJobs]      = useState(() => load(K.j));
  const [checks,    setChecks]    = useState(() => load(K.c));
  const [sd,        setSd]        = useState(() => load(K.sd));
  const [inv,       setInv]       = useState(() => load(K.inv));

  // ── Supabase-backed state ─────────────────────────────────────────────────
  const [miss,         setMiss]         = useState([]);   // inventory_needs
  const [damageRpts,   setDamageRpts]   = useState([]);   // damage_reports
  const [messages,     setMessages]     = useState([]);   // messages
  const [sbReady,      setSbReady]      = useState(false);// connection status
  const [damageF,      setDamageF]      = useState("open"); // damage-only filter

  // ── Message compose ───────────────────────────────────────────────────────
  const [msgBody,       setMsgBody]       = useState("");
  const [sending,       setSending]       = useState(false);
  const [unread,        setUnread]        = useState(0);
  const [activeThread,  setActiveThread]  = useState(null); // { name, dept } | null
  const msgListRef = useRef(null);

  // ── Supabase: initial fetch + real-time subscriptions ─────────────────────
  useEffect(() => {
    // Fetch all three tables on mount
    Promise.all([
      sb.from("inventory_needs").select("*").order("created_at", { ascending: false }),
      sb.from("damage_reports").select("*").order("created_at",  { ascending: false }),
      sb.from("messages").select("*").order("created_at",        { ascending: true  }).limit(200),
      sb.from("sops").select("*").order("updated_at",            { ascending: false }),
      sb.from("sop_views").select("*").order("viewed_at",        { ascending: false }),
    ]).then(([ni, dr, ms, so, sv]) => {
      if (ni.data) setMiss(ni.data);
      if (dr.data) setDamageRpts(dr.data);
      if (ms.data) setMessages(ms.data);
      if (so.data) setSops(so.data);
      if (sv.data) setSopViews(sv.data);
      setSbReady(true);
    });

    // Real-time: inventory_needs
    const invCh = sb.channel("sup-inventory")
      .on("postgres_changes", { event: "*", schema: "public", table: "inventory_needs" }, payload => {
        if (payload.eventType === "INSERT") {
          setMiss(p => [payload.new, ...p]);
        } else if (payload.eventType === "UPDATE") {
          setMiss(p => p.map(r => r.id === payload.new.id ? payload.new : r));
        } else if (payload.eventType === "DELETE") {
          setMiss(p => p.filter(r => r.id !== payload.old.id));
        }
      })
      .subscribe();

    // Real-time: damage_reports
    const dmgCh = sb.channel("sup-damage")
      .on("postgres_changes", { event: "*", schema: "public", table: "damage_reports" }, payload => {
        if (payload.eventType === "INSERT") {
          setDamageRpts(p => [payload.new, ...p]);
        } else if (payload.eventType === "UPDATE") {
          setDamageRpts(p => p.map(r => r.id === payload.new.id ? payload.new : r));
        } else if (payload.eventType === "DELETE") {
          setDamageRpts(p => p.filter(r => r.id !== payload.old.id));
        }
      })
      .subscribe();

    // Real-time: messages
    const msgCh = sb.channel("sup-messages")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, payload => {
        setMessages(p => {
          if (p.some(m => m.id === payload.new.id)) return p;
          return [...p, payload.new];
        });
        // only badge for incoming crew messages, not supervisor's own sends
        if (payload.new.sender_name !== "Supervisor") setUnread(n => n + 1);
      })
      .subscribe();

    const sopCh = sb.channel("sup-sops")
      .on("postgres_changes", { event: "*", schema: "public", table: "sops" }, payload => {
        if (payload.eventType === "INSERT")      setSops(p => [payload.new, ...p]);
        else if (payload.eventType === "UPDATE") setSops(p => p.map(s => s.id === payload.new.id ? payload.new : s));
        else if (payload.eventType === "DELETE") setSops(p => p.filter(s => s.id !== payload.old.id));
      })
      .subscribe();

    const sopViewCh = sb.channel("sup-sop-views")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "sop_views" }, payload => {
        setSopViews(p => [payload.new, ...p]);
      })
      .subscribe();

    return () => {
      sb.removeChannel(invCh);
      sb.removeChannel(dmgCh);
      sb.removeChannel(msgCh);
      sb.removeChannel(sopCh);
      sb.removeChannel(sopViewCh);
    };
  }, []);

  // Auto-scroll messages list when new messages arrive
  useEffect(() => {
    if (view === "messages" && msgListRef.current) {
      msgListRef.current.scrollTop = msgListRef.current.scrollHeight;
    }
  }, [messages, view]);

  // Clear unread badge when opening messages tab
  const openMessages = () => { setView("messages"); setUnread(0); };

  // ── localStorage setters (supervisor-local) ───────────────────────────────
  const UJ = u => { setJobs(u);   sv(K.j,  u); };
  const UC = u => { setChecks(u); sv(K.c,  u); };
  const US = u => { setSd(u);     sv(K.sd, u); };
  const UI = u => { setInv(u);    sv(K.inv,u); };

  // ── QC ────────────────────────────────────────────────────────────────────
  const [qcJob,        setQcJob]        = useState(null);
  const [qcType,       setQcType]       = useState("first-article");
  const [qcI,          setQcI]          = useState({});
  const [qcN,          setQcN]          = useState("");
  const [partChecks,   setPartChecks]   = useState({});
  const [expandedPart, setExpandedPart] = useState(null);

  // ── Job detail ────────────────────────────────────────────────────────────
  const [detailJob,   setDetailJob]   = useState(null);
  const [showAddPart, setShowAddPart] = useState(false);
  const [pf,          setPf]          = useState({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""});

  // ── Dashboard ─────────────────────────────────────────────────────────────
  const [showAJ, setShowAJ] = useState(false);
  const [nj,     setNj]     = useState({id:"",desc:"",type:"Base cabinet"});
  const [jobF,   setJobF]   = useState("all");
  const [csvData,setCsvData]= useState(null);
  const [colMap, setColMap] = useState({job:0,part:1,qty:-1,w:-1,h:-1,d:-1,mat:-1});

  // ── Missing parts (Supabase inventory_needs) ──────────────────────────────
  const [showAM, setShowAM] = useState(false);
  const [nm,     setNm]     = useState({jobId:"",part:"",qty:1,stage:"Cutting",notes:""});
  const [missF,  setMissF]  = useState("pending");

  // ── Standup ───────────────────────────────────────────────────────────────
  const [showSD, setShowSD] = useState(false);
  const [nsd,    setNsd]    = useState({date:today(),priorities:"",crew:"",issues:"",notes:""});

  // ── Inventory (local) ─────────────────────────────────────────────────────
  const [showAI, setShowAI] = useState(false);
  const [ni,     setNi]     = useState({name:"",unit:"sheets",qty:0,threshold:5});

  // ── Report ────────────────────────────────────────────────────────────────
  const [report, setReport] = useState("");
  const [copied, setCopied] = useState(false);

  // ── Toast ─────────────────────────────────────────────────────────────────
  const [toast, setToast] = useState(null);
  const showToastMsg = msg => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  // ── SOPs (Supabase) ───────────────────────────────────────────────────────
  const [sops,         setSops]         = useState([]);
  const [sopViews,     setSopViews]     = useState([]);
  const [showSopModal, setShowSopModal] = useState(false);
  const [editSopId,    setEditSopId]    = useState(null);
  const defaultSopForm = { title:"", dept:"Assembly", description:"", steps:[{instruction:"",warning:""}], pdf_url:"" };
  const [sopForm,      setSopForm]      = useState(defaultSopForm);

  // ── Job actions ───────────────────────────────────────────────────────────
  const addJob = () => {
    if (!nj.id.trim()) return;
    UJ([{ uid:uid(), jobId:nj.id.trim(), desc:nj.desc.trim(), type:nj.type,
          status:"active", created:new Date().toISOString(), parts:[] }, ...jobs]);
    setNj({id:"",desc:"",type:"Base cabinet"}); setShowAJ(false);
  };

  const openDetail = job => {
    setDetailJob({...job}); setShowAddPart(false);
    setPf({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""});
    setView("job_detail");
  };

  // ── Part actions ──────────────────────────────────────────────────────────
  const addPart = () => {
    if (!pf.desc.trim()) return;
    const part = { uid:uid(), ...pf, qty:Number(pf.qty)||1 };
    const updJ = { ...detailJob, parts:[...(detailJob.parts||[]), part] };
    setDetailJob(updJ);
    UJ(jobs.map(j => j.uid === detailJob.uid ? updJ : j));
    setPf({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""}); setShowAddPart(false);
  };

  const delPart = puid => {
    const updJ = { ...detailJob, parts:(detailJob.parts||[]).filter(p => p.uid !== puid) };
    setDetailJob(updJ);
    UJ(jobs.map(j => j.uid === detailJob.uid ? updJ : j));
  };

  // ── QC actions ────────────────────────────────────────────────────────────
  const startCheck = job => {
    setQcJob(job); setQcI({}); setQcN(""); setPartChecks({}); setExpandedPart(null);
    setQcType("first-article"); setView("check");
  };

  const togglePart = puid =>
    setPartChecks(p => ({ ...p, [puid]:{ ...p[puid], checked:!p[puid]?.checked } }));

  const setPartNote = (puid, note) =>
    setPartChecks(p => ({ ...p, [puid]:{ ...p[puid], note } }));

  const submitCheck = async () => {
    const items = CL.map(i => ({ ...i, passed:qcI[i.id]===true, failed:qcI[i.id]===false }));
    const parts = qcJob.parts || [];
    const anyFail = items.some(i => i.failed);
    const allPass = items.every(i => i.passed);
    const partsOk = parts.length === 0 || parts.every(p => partChecks[p.uid]?.checked);
    const hasNotes = parts.some(p => partChecks[p.uid]?.note?.trim());
    const result = (anyFail || (!partsOk && parts.length > 0)) ? "fail"
                 : (allPass && partsOk && !hasNotes)           ? "pass" : "partial";

    // Save locally
    UC([{ uid:uid(), jobUid:qcJob.uid, jobId:qcJob.jobId, type:qcType, items,
          partResults:partChecks, partsTotal:parts.length,
          partsVerified:parts.filter(p => partChecks[p.uid]?.checked).length,
          notes:qcN, result, timestamp:new Date().toISOString() }, ...checks]);
    UJ(jobs.map(j => j.uid === qcJob.uid
      ? { ...j, status: result==="fail"?"flagged" : result==="pass"?"passed" : j.status }
      : j));

    // Write QC result to Supabase messages so crew sees it
    const emoji = result === "pass" ? "✅" : result === "fail" ? "❌" : "⚠️";
    const body = `${emoji} QC ${result.toUpperCase()} — Job #${qcJob.jobId} (${qcType})` +
      (qcN ? `\n${qcN}` : "") +
      (parts.length > 0 ? `\nParts verified: ${parts.filter(p=>partChecks[p.uid]?.checked).length}/${parts.length}` : "");
    await sb.from("messages").insert({ sender_name:"Supervisor", dept:"QC", body });

    setView("dashboard");
  };

  // ── Missing parts → Supabase inventory_needs ─────────────────────────────
  const addMiss = async () => {
    if (!nm.part.trim()) return;
    const { data, error } = await sb.from("inventory_needs")
      .insert({
        item:   nm.part.trim(),
        dept:   nm.stage,
        job_id: nm.jobId.trim() || null,
        qty:    Number(nm.qty) || 1,
        status: "pending",
      })
      .select().single();
    if (!error && data) setMiss(p => [data, ...p]);
    setNm({jobId:"",part:"",qty:1,stage:"Cutting",notes:""}); setShowAM(false);
  };

  const resolveMiss = async id => {
    setMiss(p => p.map(m => m.id === id ? { ...m, status:"received" } : m));
    await sb.from("inventory_needs").update({ status:"received" }).eq("id", id);
  };

  const deleteMiss = async id => {
    setMiss(p => p.filter(m => m.id !== id));
    await sb.from("inventory_needs").delete().eq("id", id);
  };

  // ── Damage reports: status update ─────────────────────────────────────────
  const updateDamageStatus = async (id, status) => {
    setDamageRpts(p => p.map(d => d.id === id ? { ...d, status } : d));
    await sb.from("damage_reports").update({ status }).eq("id", id);
  };

  // ── Standup → localStorage + Supabase messages ────────────────────────────
  const addSD = async () => {
    US([{ uid:uid(), ...nsd, created:new Date().toISOString() }, ...sd]);

    // Post a standup summary to shared messages
    const body = [
      `📋 STANDUP — ${nsd.date}`,
      nsd.priorities && `Priority jobs: ${nsd.priorities}`,
      nsd.crew       && `Crew: ${nsd.crew}`,
      nsd.issues     && `Open issues: ${nsd.issues}`,
      nsd.notes      && `Notes: ${nsd.notes}`,
    ].filter(Boolean).join("\n");
    await sb.from("messages").insert({ sender_name:"Supervisor", dept:"Management", body });

    setNsd({date:today(),priorities:"",crew:"",issues:"",notes:""}); setShowSD(false);
  };

  // ── Messages: supervisor reply (threaded) ────────────────────────────────
  const sendMessage = async () => {
    const trimmed = msgBody.trim();
    if (!trimmed || sending || !activeThread) return;

    const payload = {
      sender_name: "Supervisor",
      dept:        "Management",
      body:        trimmed,
    };
    const optimistic = { id:"opt-"+Date.now(), ...payload, created_at:new Date().toISOString() };

    // Clear input and show optimistic message immediately
    setMsgBody("");
    setMessages(p => [...p, optimistic]);
    setSending(true);

    try {
      const { data, error } = await sb.from("messages").insert(payload).select().single();
      if (error) {
        console.error("[sendMessage] insert failed:", error.message, error.code, error.details);
        setMessages(p => p.filter(m => m.id !== optimistic.id));
      } else {
        // Remove the optimistic row, then add the confirmed row only if
        // real-time hasn't already inserted it (avoids duplicates when the
        // realtime event races ahead of the insert response).
        setMessages(p => {
          const without = p.filter(m => m.id !== optimistic.id);
          if (without.some(m => m.id === data.id)) return without;
          return [...without, data];
        });
      }
    } catch(err) {
      console.error("[sendMessage] unexpected error:", err);
      setMessages(p => p.filter(m => m.id !== optimistic.id));
    } finally {
      // Always re-enable the button, regardless of success or failure
      setSending(false);
    }
  };

  // ── Local inventory ───────────────────────────────────────────────────────
  const addInv = () => {
    if (!ni.name.trim()) return;
    UI([...inv, { uid:uid(), ...ni, qty:Number(ni.qty), threshold:Number(ni.threshold), updated:new Date().toISOString() }]);
    setNi({name:"",unit:"sheets",qty:0,threshold:5}); setShowAI(false);
  };
  const updQ = (id, q) => UI(inv.map(i => i.uid===id ? { ...i, qty:Number(q), updated:new Date().toISOString() } : i));
  const iStatus = i => i.qty===0 ? "critical" : i.qty<=i.threshold ? "low" : "ok";
  const iColor  = s => s==="critical" ? "#ef4444" : s==="low" ? "#f59e0b" : "#22c55e";

  // ── CSV import ────────────────────────────────────────────────────────────
  const handleCSV = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      const lines = ev.target.result.split("\n").filter(l => l.trim());
      if (lines.length < 2) return;
      const headers = lines[0].split(",").map(h => h.trim().replace(/"/g,""));
      const all = lines.slice(1).map(l => l.split(",").map(c => c.trim().replace(/"/g,"")));
      const ji = headers.findIndex(h => /(^job$|job.?no|job.?num|wo\b|work.?order)/i.test(h));
      const pi = headers.findIndex(h => /(part|desc|cabinet|item|name|product|component)/i.test(h));
      const qi = headers.findIndex(h => /^(qty|quantity)$/i.test(h));
      const wi = headers.findIndex(h => /^(width|w|wd)$/i.test(h));
      const hi = headers.findIndex(h => /^(height|h|ht)$/i.test(h));
      const di = headers.findIndex(h => /^(depth|d|dp|length|len)$/i.test(h));
      const mi = headers.findIndex(h => /(mat|material|species|finish)/i.test(h));
      setColMap({ job:ji>=0?ji:0, part:pi>=0?pi:1, qty:qi>=0?qi:-1, w:wi>=0?wi:-1, h:hi>=0?hi:-1, d:di>=0?di:-1, mat:mi>=0?mi:-1 });
      setCsvData({ headers, preview:all.slice(0,5), all });
    };
    r.readAsText(file);
  };

  const setCol = (field, val) => setColMap(p => ({ ...p, [field]:Number(val) }));

  const importCSV = () => {
    const grouped = {};
    csvData.all.forEach(row => {
      const jid = row[colMap.job]?.trim();
      if (!jid) return;
      if (!grouped[jid]) grouped[jid] = [];
      grouped[jid].push(row);
    });
    const cm = colMap;
    const newJobs = Object.entries(grouped).map(([jid, rows]) => ({
      uid: uid(), jobId: jid, desc: "", type: "Base cabinet",
      status: "active", created: new Date().toISOString(),
      parts: rows.map(row => ({
        uid:      uid(),
        partNum:  cm.part >= 0 ? (row[cm.part]?.trim()  || "") : "",
        desc:     cm.part >= 0 ? (row[cm.part]?.trim()  || "") : "",
        qty:      cm.qty  >= 0 ? (Number(row[cm.qty])   || 1)  : 1,
        width:    cm.w    >= 0 ? (row[cm.w]?.trim()     || "") : "",
        height:   cm.h    >= 0 ? (row[cm.h]?.trim()     || "") : "",
        depth:    cm.d    >= 0 ? (row[cm.d]?.trim()     || "") : "",
        material: cm.mat  >= 0 ? (row[cm.mat]?.trim()   || "") : "",
      }))
    }));
    UJ([...newJobs, ...jobs]);
    setCsvData(null);
  };

  // ── Report ────────────────────────────────────────────────────────────────
  const genReport = () => {
    const wk     = new Date(Date.now() - 7*24*3600*1000);
    const rc     = checks.filter(c => new Date(c.timestamp) > wk);
    const openM  = miss.filter(m => m.status === "pending");
    const openD  = damageRpts.filter(d => d.status === "open");
    const lowI   = inv.filter(i => i.qty <= i.threshold);
    const stageMap = {};
    miss.forEach(m => { stageMap[m.dept] = (stageMap[m.dept]||0) + 1; });
    const flagged = jobs.filter(j => j.status === "flagged");
    const lines = [
      "SAWDUST STUDIO — QC WEEKLY REPORT",
      "Generated: " + fmtDT(new Date().toISOString()),
      "",
      "-- QC CHECKS (LAST 7 DAYS) --",
      "Total: " + rc.length + "  |  Passed: " + rc.filter(c=>c.result==="pass").length + "  |  Failed: " + rc.filter(c=>c.result==="fail").length,
      "",
      "-- FLAGGED JOBS --",
      ...(flagged.length ? flagged.map(j => "  * #" + j.jobId + "  " + j.desc) : ["  None"]),
      "",
      "-- INVENTORY NEEDS (" + openM.length + " pending) --",
      ...(openM.length ? openM.map(m => "  * #" + (m.job_id||"--") + "  " + m.item + "  (" + m.qty + " pcs)  @  " + m.dept) : ["  None"]),
      "",
      "-- INVENTORY NEEDS BY DEPT --",
      ...Object.entries(stageMap).sort((a,b)=>b[1]-a[1]).map(([s,n]) => "  " + s + ": " + n),
      "",
      "-- DAMAGE REPORTS (" + openD.length + " open) --",
      ...(openD.length ? openD.map(d => "  * #" + (d.job_id||"--") + "  " + d.part_name + "  @  " + d.dept + (d.notes ? "  — "+d.notes : "")) : ["  None"]),
      "",
      "-- LOW INVENTORY (" + lowI.length + " items) --",
      ...(lowI.length ? lowI.map(i => "  * " + i.name + ": " + i.qty + " " + i.unit + "  (min: " + i.threshold + ")") : ["  None"]),
    ];
    setReport(lines.join("\n"));
  };

  const copyReport = () =>
    navigator.clipboard.writeText(report).then(() => { setCopied(true); setTimeout(()=>setCopied(false), 2000); });

  // ── SOPs ──────────────────────────────────────────────────────────────────
  const saveSop = async () => {
    if (!sopForm.title.trim()) return;
    const steps = sopForm.steps.map((s, i) => ({
      step_number: i + 1,
      instruction: s.instruction,
      warning:     s.warning || null,
    }));
    const payload = {
      title:       sopForm.title.trim(),
      dept:        sopForm.dept,
      description: sopForm.description.trim() || null,
      steps,
      pdf_url:     sopForm.pdf_url.trim() || null,
      updated_at:  new Date().toISOString(),
    };
    if (editSopId) {
      const { data, error } = await sb.from("sops").update(payload).eq("id", editSopId).select().single();
      if (!error && data) setSops(p => p.map(s => s.id === editSopId ? data : s));
    } else {
      const { data, error } = await sb.from("sops").insert({ ...payload, created_by: "Supervisor" }).select().single();
      if (!error && data) setSops(p => [data, ...p]);
    }
    setShowSopModal(false);
    showToastMsg("SOP saved — crew can see it immediately");
  };

  const deleteSop = async id => {
    if (!confirm("Delete this SOP? This cannot be undone.")) return;
    await sb.from("sops").delete().eq("id", id);
    setSops(p => p.filter(s => s.id !== id));

  // ── Derived ───────────────────────────────────────────────────────────────
  const filtJobs = jobF === "all" ? jobs : jobs.filter(j => j.status === jobF);
  const filtMiss = missF === "all" ? miss : miss.filter(m => m.status === missF);

  // ── Nav ───────────────────────────────────────────────────────────────────

      h("div", {style:{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}, TABS.map(navBtn))

    // ── DASHBOARD ─────────────────────────────────────────────────────────────
    view==="dashboard" && h("div", null,
      h("div", {style:{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:"1.5rem"}},
        h(Stat, {label:"qc passes 7d",         val:sevenDayPasses,                               color:"#22c55e"}),
        h(Stat, {label:"flagged jobs",           val:jobs.filter(j=>j.status==="flagged").length,  color:"#ef4444"}),
        h(Stat, {label:"pending inventory needs",val:miss.filter(m=>m.status==="pending").length,  color:"#f59e0b"}),
        h(Stat, {label:"open damage reports",    val:damageRpts.filter(d=>d.status==="open").length,color:"#3b82f6"})
      ),

      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div", {style:{display:"flex",gap:6}}, ["all","active","passed","flagged"].map(f => h(FBtn,{key:f,val:f,cur:jobF,set:setJobF}))),
        h("div", {style:{display:"flex",gap:8}},
          h("button", {className:"bp", onClick:()=>{setShowAJ(v=>!v);setCsvData(null)}}, "+ add job"),
          h("label", {style:{fontSize:11,cursor:"pointer",borderRadius:6,border:"1px solid #1e1e1e",background:"transparent",color:"#555",padding:"7px 14px",letterSpacing:".05em",display:"inline-block",whiteSpace:"nowrap"}},
            "↑ import csv",
            h("input", {type:"file",accept:".csv,.txt",onChange:handleCSV,onClick:e=>{e.target.value=""},style:{display:"none"}})
          )
        )
      ),

      showAJ && h("div", {style:CS2},
        h("div", {style:{display:"grid",gridTemplateColumns:"1fr 2fr 1fr",gap:10,marginBottom:10}},
          h("input", {placeholder:"Job / WO #",  value:nj.id,   onChange:e=>setNj({...nj,id:e.target.value}),   style:IS}),
          h("input", {placeholder:"Description", value:nj.desc, onChange:e=>setNj({...nj,desc:e.target.value}), style:IS}),
          h("select",{value:nj.type,onChange:e=>setNj({...nj,type:e.target.value}),style:IS}, CTYPES.map(t=>h("option",{key:t},t)))
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{className:"bp",onClick:addJob},"create"),
          h("button",{onClick:()=>setShowAJ(false)},"cancel")
        )
      ),

      csvData && h("div", {style:CS2},
        h("div",{style:{fontSize:12,fontWeight:500,marginBottom:3,color:"#e5e5e5"}}, "csv column mapping"),
        h("div",{style:{fontSize:11,color:"#444",marginBottom:12}}, "rows are grouped by job # — each row becomes a part under that job"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:8,marginBottom:8}},
          colSel("job","job / wo # (required)"), colSel("part","part description (required)"), colSel("qty","qty"), colSel("mat","material")
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:8,marginBottom:12}},
          colSel("w","width"), colSel("h","height"), colSel("d","depth")
        ),
        h("div",{style:{fontSize:10,color:"#444",marginBottom:6}}, "preview — first 5 rows"),
        h("div",{style:{background:"#0d0d0d",borderRadius:6,border:"1px solid #1e1e1e",padding:"10px 12px",marginBottom:12}},
          csvData.preview.map((row,i) => {
            const dims = [colMap.w>=0&&row[colMap.w], colMap.h>=0&&row[colMap.h], colMap.d>=0&&row[colMap.d]].filter(Boolean).join("x");
            return h("div",{key:i,style:{fontSize:12,color:"#888",padding:"4px 0",display:"flex",gap:14}},
              h("span",{style:{color:AM,minWidth:70,fontWeight:500}}, row[colMap.job]||"—"),
              h("span",{style:{flex:1,color:"#ccc"}}, colMap.part>=0 ? row[colMap.part] : ""),
              dims && h("span",{style:{color:"#444"}}, dims),
              colMap.mat>=0 && row[colMap.mat] && h("span",{style:{color:"#444"}}, row[colMap.mat])
            );
          })
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{className:"bp",onClick:importCSV},
            "import " + Object.keys(csvData.all.reduce((g,r)=>{const k=r[colMap.job]?.trim();if(k)g[k]=1;return g},{})).length + " jobs"
          ),
          h("button",{onClick:()=>setCsvData(null)}, "cancel")
        )
      ),

      filtJobs.length===0 && h(Empty, {msg: jobF==="all" ? "No jobs yet. Add one above or import from a Microvellum CSV export." : "No "+jobF+" jobs."}),

      filtJobs.map(job =>
        h("div",{key:job.uid,style:{...CS,borderLeft:`3px solid ${SM[job.status]?.bar||"#333"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}},
          h("div",null,
            h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:job.desc?5:0}},
              h("span",{style:{fontWeight:500,color:AM,fontSize:15}}, "#"+job.jobId),
              h("span",{style:{fontSize:11,color:"#444"}}, job.type),
              h(Badge,{s:job.status}),
              (job.parts||[]).length>0 && h(Pill,{label:(job.parts||[]).length+" parts",color:"#555"})
            ),
            job.desc && h("div",{style:{fontSize:12,color:"#666"}}, job.desc)
          ),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{onClick:()=>openDetail(job),style:{color:"#60a5fa",borderColor:"#1e3a5f"}}, "parts →"),
            h("button",{onClick:()=>startCheck(job),style:{color:AM,borderColor:"#78350f"}},        "qc →"),
            h("button",{className:"bd",onClick:()=>UJ(jobs.filter(j=>j.uid!==job.uid)),style:{padding:"7px 10px"}}, "✕")
          )
        )
      )
    ),

    // ── JOB DETAIL ────────────────────────────────────────────────────────────
    view==="job_detail" && detailJob && h("div", null,
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem",paddingBottom:"0.75rem",borderBottom:"1px solid #1a1a1a"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:12}},
          h("button",{onClick:()=>setView("dashboard"),style:{fontSize:11,padding:"5px 12px"}}, "← back"),
          h("span",{style:{fontWeight:500,color:AM,fontSize:16}}, "#"+detailJob.jobId),
          detailJob.desc && h("span",{style:{fontSize:13,color:"#555"}}, detailJob.desc)
        ),
        h("button",{className:"bp",onClick:()=>startCheck(jobs.find(j=>j.uid===detailJob.uid)||detailJob)}, "qc check →")
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",{style:{fontSize:11,color:"#444"}}, (detailJob.parts||[]).length+" parts / components"),
        h("button",{className:"bp",onClick:()=>setShowAddPart(v=>!v)}, "+ add part")
      ),
      showAddPart && h("div",{style:CS2},
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 3fr 60px",gap:10,marginBottom:10}},
          h("input",{placeholder:"Part #",                 value:pf.partNum, onChange:e=>setPf({...pf,partNum:e.target.value}),style:IS}),
          h("input",{placeholder:"Description",            value:pf.desc,    onChange:e=>setPf({...pf,desc:e.target.value}),   style:IS}),
          h("input",{placeholder:"Qty",type:"number",min:1,value:pf.qty,     onChange:e=>setPf({...pf,qty:e.target.value}),    style:IS})
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 2fr",gap:10,marginBottom:10}},
          h("input",{placeholder:"Width",    value:pf.width,    onChange:e=>setPf({...pf,width:e.target.value}),    style:IS}),
          h("input",{placeholder:"Height",   value:pf.height,   onChange:e=>setPf({...pf,height:e.target.value}),   style:IS}),
          h("input",{placeholder:"Depth",    value:pf.depth,    onChange:e=>setPf({...pf,depth:e.target.value}),    style:IS}),
          h("input",{placeholder:"Material", value:pf.material, onChange:e=>setPf({...pf,material:e.target.value}), style:IS})
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{className:"bp",onClick:addPart},       "add part"),
          h("button",{onClick:()=>setShowAddPart(false)},    "cancel")
        )
      ),
      (detailJob.parts||[]).length===0 && !showAddPart && h(Empty,{msg:"No parts yet. Add manually or import via CSV from the dashboard."}),
      (detailJob.parts||[]).map((p,idx) =>
        h("div",{key:p.uid,style:{...CS,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}},
            h("span",{style:{fontSize:11,color:"#333",minWidth:24,textAlign:"right",fontWeight:500}}, String(idx+1).padStart(2,"0")),
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                p.partNum && h("span",{style:{fontSize:11,color:AM,fontWeight:500}}, p.partNum),
                h("span",{style:{fontSize:13,color:"#e5e5e5"}}, p.desc||"—"),
                h("span",{style:{fontSize:11,color:"#444"}}, "×"+p.qty)

          h("button",{className:"bd",onClick:()=>delPart(p.uid),style:{padding:"5px 10px",flexShrink:0}}, "✕")

    // ── QC CHECK ──────────────────────────────────────────────────────────────
    view==="check" && qcJob && h("div", null,
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:"1rem"}},
        h("button",{onClick:()=>setView("dashboard"),style:{fontSize:11,padding:"5px 12px"}}, "← back"),
        h("div",null,
          h("span",{style:{fontWeight:500,color:AM,fontSize:15}}, "#"+qcJob.jobId+" "),
          h("span",{style:{fontSize:13,color:"#555"}}, qcJob.desc)
        )
      ),
      h("div",{style:{display:"flex",gap:8,marginBottom:"1.25rem"}},
        ["first-article","in-process"].map(t =>
          h("button",{key:t,onClick:()=>setQcType(t),style:{
            background:  qcType===t ? AM : "transparent",
            color:       qcType===t ? "#1a0900" : "#555",

            fontWeight:  qcType===t ? 500 : 400,
          }}, t)

      ),
      h(Divider,{label:"STANDARD CHECKLIST"}),
      CL.map(qcRow),
      (qcJob.parts||[]).length > 0 && h("div",null,
        h(Divider,{label:"PARTS VERIFICATION — " + (qcJob.parts||[]).filter(p=>partChecks[p.uid]?.checked).length + " / " + (qcJob.parts||[]).length + " verified"}),
        (qcJob.parts||[]).map((p,idx) => {

            h("div",{style:{

              borderBottom: expanded ? "none" : "",
            }},
              h("div",{className:"chk"+(checked?" on":""),onClick:()=>togglePart(p.uid)}, checked?"✓":""),

                h("span",{style:{fontSize:11,color:"#555",minWidth:22,fontWeight:500,fontFamily:"'DM Mono',monospace"}}, String(idx+1).padStart(2,"0")),
                h("button",{
                  onClick:()=>setSopForm(p=>{const st=p.steps.filter((_,i)=>i!==idx);return {...p,steps:st.length?st:[{instruction:"",warning:""}]};}),
                  style:{marginLeft:"auto",fontSize:10,padding:"2px 8px",color:"#f87171",borderColor:"#7f1d1d"}
                }, "remove")
              ),
              h("textarea",{
                placeholder:"What should the crew do?",
                value:step.instruction,
                onChange:e=>{const st=[...sopForm.steps];st[idx]={...st[idx],instruction:e.target.value};setSopForm(p=>({...p,steps:st}));},
                rows:2,
                style:{...IS,marginBottom:7,resize:"vertical",fontSize:12}
              }),
              h("input",{
                placeholder:"⚠  Warning or caution (optional)",
                value:step.warning||"",
                onChange:e=>{const st=[...sopForm.steps];st[idx]={...st[idx],warning:e.target.value};setSopForm(p=>({...p,steps:st}));},
                style:{...IS,fontSize:12}
              })
            )
          ),
          h("button",{
            onClick:()=>setSopForm(p=>({...p,steps:[...p.steps,{instruction:"",warning:""}]})),
            style:{fontSize:11,color:"#f59e0b",borderColor:"#78350f",marginBottom:18,display:"block"}
          }, "+ add step"),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{className:"bp",onClick:saveSop}, editSopId?"save changes":"create sop"),
            h("button",{onClick:()=>setShowSopModal(false)}, "cancel")
          )
        )
      )
    ),

    // Toast
    toast && h("div",{className:"toast"}, toast)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
