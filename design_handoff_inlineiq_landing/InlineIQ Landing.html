<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InlineIQ — Keep your shop sharp.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="bg-watermark"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="mocks.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "headline": "brand",
      "accent": "#2DE1C9"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.style.setProperty('--teal-bright', tweaks.accent || '#2DE1C9');
      }, [tweaks.accent]);

      return (
        <>
          <Nav/>
          <main>
            <Hero headline={tweaks.headline}/>
            <Capabilities/>
            <Deepdives/>
            <Intel/>
            <Pricing/>
            <FinalCTA/>
          </main>
          <Footer/>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Hero headline">
              <TweakSelect
                value={tweaks.headline}
                onChange={v => setTweak('headline', v)}
                options={[
                  { value: 'brand', label: 'Brand line — "InlineIQ runs your shop…"' },
                  { value: 'problem', label: 'Problem-led — "Your floor is blind."' },
                  { value: 'tagline', label: 'Tagline-led — "Keep your shop sharp."' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Primary accent">
              <TweakColor
                value={tweaks.accent}
                onChange={v => setTweak('accent', v)}
                options={['#2DE1C9', '#5EEAD4', '#22D3EE', '#34D399']}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
