<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sawdust Studio — Shop Supervisor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e5e5e5;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
#root{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
input,select,textarea{
  font-family:'DM Mono','Courier New',monospace;font-size:13px;
  background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;
  color:#e5e5e5;padding:8px 12px;width:100%;outline:none;
}
input:focus,select:focus,textarea:focus{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.12)}
select option{background:#1a1a1a;color:#e5e5e5}
textarea{resize:vertical}
button{
  font-family:'DM Mono','Courier New',monospace;font-size:11px;cursor:pointer;
  border-radius:6px;border:1px solid #2a2a2a;background:transparent;
  color:#aaa;padding:7px 14px;letter-spacing:.05em;
  transition:background .1s,color .1s,border-color .1s;
}
button:hover{background:#1a1a1a;color:#e5e5e5}
.bp{background:#f59e0b;color:#1a0900;border-color:#f59e0b;font-weight:500}
.bp:hover{background:#d97706;border-color:#d97706;color:#0d0500}
.bd{color:#f87171;border-color:#7f1d1d}.bd:hover{background:#2e1a1a}
.bg{color:#4ade80;border-color:#14532d}.bg:hover{background:#1a2e1a}
.chk{
  width:18px;height:18px;min-width:18px;border:1px solid #333;border-radius:4px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:11px;background:#141414;transition:all .15s;flex-shrink:0;
}
.chk.on{background:#22c55e;border-color:#22c55e;color:#061206;font-weight:500}
/* message bubbles */
.bubble-in{background:#2a2a2a;border-radius:0 14px 14px 14px;padding:9px 14px;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word}
.bubble-out{background:#f59e0b;border-radius:14px 0 14px 14px;padding:9px 14px;word-break:break-word;word-wrap:break-word;overflow-wrap:break-word}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#22c55e;color:#0a1f0a;border-radius:8px;padding:12px 22px;font-size:13px;font-weight:500;z-index:300;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none;font-family:'DM Mono','Courier New',monospace}
</style>
</head>
<body>
<div id="root"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
// ── Supabase client ───────────────────────────────────────────────────────────
const SUPABASE_URL      = "https://suwadpgtqifwufmlwhpk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1d2FkcGd0cWlmd3VmbWx3aHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODIxMzQsImV4cCI6MjA5MTg1ODEzNH0.iVC__gcDTj4nF8JpwfdWRElUDrFGhI0HNGcpoU4vmoI";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect, useRef } = React;
const h = React.createElement;

// ── localStorage keys (supervisor-only data) ──────────────────────────────────
const K = { j:"ssj6", c:"ssc6", sd:"sssd3", inv:"ssinv3" };

// ── Constants ─────────────────────────────────────────────────────────────────
const CL = [
  { id:"dm", label:"Dimensions match shop drawings" },
  { id:"sq", label:"Cabinet is square / plumb" },
  { id:"eb", label:"Edge banding flush and clean" },
  { id:"hw", label:"Hardware locations correct" },
  { id:"cu", label:"Cut quality — no tearout or chipping" },
  { id:"rv", label:"Door / drawer reveal consistent" },
  { id:"lb", label:"Part labeling correct" },
  { id:"df", label:"No visible surface defects" },
  { id:"jt", label:"Joints tight / fasteners set" },
];
const CTYPES = ["Base cabinet","Upper cabinet","Tall cabinet","Island","Drawer box","Door","Custom"];
const STAGES = ["Cutting","Edgebanding","Assembly","Finishing","Shipping","Install"];
const UNITS      = ["sheets","pcs","lbs","ft","rolls","boxes","gallons"];
const CREW_DEPTS = ["Cutting","Edgebanding","Assembly","Finishing","Shipping","Install","Craftsman","Management"];
const AM = "#f59e0b";
const SM = {
  active:  { bar:"#3b82f6", bg:"#1e2a3a", txt:"#60a5fa" },
  passed:  { bar:"#22c55e", bg:"#1a2e1a", txt:"#4ade80" },
  flagged: { bar:"#ef4444", bg:"#2e1a1a", txt:"#f87171" },
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid   = () => Date.now() + "_" + Math.random().toString(36).slice(2,5);
const fmtD  = iso => new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtDT = iso => fmtD(iso) + " " + new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const today = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const dimStr = p => [p.width,p.height,p.depth].filter(v => v && v.trim()).join(" x ");

const getWebDeviceId = () => {
  let id = localStorage.getItem("web_device_id");
  if (!id) {
    id = "web_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
    localStorage.setItem("web_device_id", id);
  }
  return id;
};

// localStorage (supervisor-local tables only)
const load = (k, d=[]) => { try { const v=localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } };
const sv   = (k, v)    => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// Shared styles
const CS  = { background:"#141414", border:"1px solid #222", borderRadius:6, padding:"12px 16px", marginBottom:8 };
const CS2 = { background:"#111",    border:"1px solid #222", borderRadius:6, padding:"14px 16px", marginBottom:10 };
const IS  = { fontSize:13, fontFamily:"'DM Mono','Courier New',monospace", background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:6, color:"#e5e5e5", padding:"8px 12px", width:"100%", outline:"none" };

// ── Mini components ───────────────────────────────────────────────────────────
const Badge = ({s}) => {
  const m = SM[s] || SM.active;
  return h("span",{style:{background:m.bg,color:m.txt,fontSize:10,padding:"2px 9px",borderRadius:99,border:`1px solid ${m.bar}50`,fontWeight:500,letterSpacing:".04em"}},s);
};
const Stat = ({label,val,color}) =>
  h("div",{style:{background:"#141414",borderRadius:6,padding:"14px 16px",borderTop:`3px solid ${color}`}},
    h("div",{style:{fontSize:28,fontWeight:500,color}}, val),
    h("div",{style:{fontSize:10,color:"#555",marginTop:4,letterSpacing:".07em"}}, label)
  );
const Pill = ({label,color}) =>
  h("span",{style:{fontSize:10,background:color+"20",color,padding:"2px 9px",borderRadius:99,border:`1px solid ${color}40`,whiteSpace:"nowrap",letterSpacing:".04em"}}, label);
const Divider = ({label}) =>
  h("div",{style:{display:"flex",alignItems:"center",gap:10,margin:"20px 0 12px"}},
    h("div",{style:{height:1,flex:1,background:"#1e1e1e"}}),
    h("span",{style:{fontSize:10,color:"#444",letterSpacing:".1em",whiteSpace:"nowrap"}}, label),
    h("div",{style:{height:1,flex:1,background:"#1e1e1e"}})
  );
const Empty = ({msg}) =>
  h("div",{style:{textAlign:"center",padding:"64px 0",color:"#333",fontSize:13}}, msg);
const FBtn = ({val,cur,set}) =>
  h("button",{onClick:()=>set(val),style:{fontSize:11,padding:"5px 12px",background:cur===val?"#1a1a1a":"transparent",color:cur===val?"#e5e5e5":"#555",borderColor:cur===val?"#333":"#1e1e1e"}}, val);
const StatusDot = ({ok}) =>
  h("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:ok?"#22c55e":"#ef4444",marginRight:6}});

const RESOLUTION_TYPES_WEB = ["Rework Order","Material Ordered","Repaired On Site","Credited to Client","Written Off","Other"];
const RES_COLORS = {
  "Rework Order":       "#f59e0b",
  "Material Ordered":   "#3b82f6",
  "Repaired On Site":   "#22c55e",
  "Credited to Client": "#a78bfa",
  "Written Off":        "#ef4444",
  "Other":              "#6b7280",
};

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [view,      setView]      = useState("dashboard");

  // ── Supervisor session ─────────────────────────────────────────────────────
  const [supervisorName,   setSupervisorName]   = useState(() => localStorage.getItem("supervisor_name") || "");
  const [supLoginName,     setSupLoginName]     = useState("");
  const [supLoginError,    setSupLoginError]    = useState("");
  const [supLoginLoading,  setSupLoginLoading]  = useState(false);

  // ── Supervisor-local state (localStorage) ──────────────────────────────────
  const [jobs,      setJobs]      = useState(() => load(K.j));
  const [checks,    setChecks]    = useState(() => load(K.c));
  const [sd,        setSd]        = useState(() => load(K.sd));
  const [inv,       setInv]       = useState(() => load(K.inv));

  // ── Supabase-backed state ─────────────────────────────────────────────────
  const [miss,         setMiss]         = useState([]);   // inventory_needs
  const [damageRpts,   setDamageRpts]   = useState([]);   // damage_reports
  const [messages,     setMessages]     = useState([]);   // messages
  const [sbReady,      setSbReady]      = useState(false);// connection status
  const [damageF,      setDamageF]      = useState("open"); // damage-only filter
  const [resolveModal, setResolveModal] = useState(null);   // damage item being resolved
  const [resType,      setResType]      = useState("Rework Order");
  const [resNotes,     setResNotes]     = useState("");
  const [resBy,        setResBy]        = useState("");
  const [resolving,    setResolving]    = useState(false);

  // ── Message compose ───────────────────────────────────────────────────────
  const [msgBody,       setMsgBody]       = useState("");
  const [sending,       setSending]       = useState(false);
  const [unread,        setUnread]        = useState(0);
  const [activeThread,  setActiveThread]  = useState(null); // { name, dept } | null
  const msgListRef = useRef(null);

  // ── Supabase: initial fetch + real-time subscriptions ─────────────────────
  useEffect(() => {
    // Fetch all tables on mount
    Promise.all([
      sb.from("inventory_needs").select("*").order("created_at", { ascending: false }),
      sb.from("damage_reports").select("*").order("created_at",  { ascending: false }),
      sb.from("messages").select("*").order("created_at",        { ascending: true  }).limit(200),
      sb.from("sops").select("*").order("updated_at",            { ascending: false }),
      sb.from("sop_views").select("*").order("viewed_at",        { ascending: false }),
      sb.from("time_clock").select("*").eq("date", today()).order("clock_in", { ascending: true }),
    ]).then(([ni, dr, ms, so, sv, tc]) => {
      if (ni.data) setMiss(ni.data);
      if (dr.data) setDamageRpts(dr.data);
      if (ms.data) setMessages(ms.data);
      if (so.data) setSops(so.data);
      if (sv.data) setSopViews(sv.data);
      if (tc.data) { setTcToday(tc.data); console.log("[supervisor] time_clock fetch →", tc.data.length, "records for", today(), tc.data); }
      setSbReady(true);
    });

    // Real-time: inventory_needs
    const invCh = sb.channel("sup-inventory")
      .on("postgres_changes", { event: "*", schema: "public", table: "inventory_needs" }, payload => {
        if (payload.eventType === "INSERT") {
          setMiss(p => [payload.new, ...p]);
        } else if (payload.eventType === "UPDATE") {
          setMiss(p => p.map(r => r.id === payload.new.id ? payload.new : r));
        } else if (payload.eventType === "DELETE") {
          setMiss(p => p.filter(r => r.id !== payload.old.id));
        }
      })
      .subscribe();

    // Real-time: damage_reports
    const dmgCh = sb.channel("sup-damage")
      .on("postgres_changes", { event: "*", schema: "public", table: "damage_reports" }, payload => {
        console.log("[realtime] damage_reports", payload.eventType, payload.new || payload.old);
        if (payload.eventType === "INSERT") {
          setDamageRpts(p => [payload.new, ...p]);
        } else if (payload.eventType === "UPDATE") {
          setDamageRpts(p => p.map(r => r.id === payload.new.id ? payload.new : r));
        } else if (payload.eventType === "DELETE") {
          setDamageRpts(p => p.filter(r => r.id !== payload.old.id));
        }
      })
      .subscribe();

    // Real-time: messages
    const msgCh = sb.channel("sup-messages")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, payload => {
        setMessages(p => {
          if (p.some(m => m.id === payload.new.id)) return p;
          return [...p, payload.new];
        });
        // only badge for incoming crew messages, not supervisor's own sends
        if (payload.new.sender_name !== "Supervisor") setUnread(n => n + 1);
      })
      .subscribe();

    const sopCh = sb.channel("sup-sops")
      .on("postgres_changes", { event: "*", schema: "public", table: "sops" }, payload => {
        if (payload.eventType === "INSERT")      setSops(p => [payload.new, ...p]);
        else if (payload.eventType === "UPDATE") setSops(p => p.map(s => s.id === payload.new.id ? payload.new : s));
        else if (payload.eventType === "DELETE") setSops(p => p.filter(s => s.id !== payload.old.id));
      })
      .subscribe();

    const sopViewCh = sb.channel("sup-sop-views")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "sop_views" }, payload => {
        setSopViews(p => [payload.new, ...p]);
      })
      .subscribe();

    // Real-time: time_clock
    const tcCh = sb.channel("sup-timeclock")
      .on("postgres_changes", { event: "*", schema: "public", table: "time_clock" }, payload => {
        const tod = today();
        if (payload.eventType === "INSERT" && payload.new.date === tod)
          setTcToday(p => [...p, payload.new]);
        else if (payload.eventType === "UPDATE")
          setTcToday(p => p.map(e => e.id === payload.new.id ? payload.new : e));
        else if (payload.eventType === "DELETE")
          setTcToday(p => p.filter(e => e.id !== payload.old.id));
      })
      .subscribe();

    return () => {
      sb.removeChannel(invCh);
      sb.removeChannel(dmgCh);
      sb.removeChannel(msgCh);
      sb.removeChannel(sopCh);
      sb.removeChannel(sopViewCh);
      sb.removeChannel(tcCh);
    };
  }, []);

  // Update tcNow every 30s so elapsed hours in the report stay fresh
  useEffect(() => {
    const t = setInterval(() => setTcNow(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);

  // Auto-scroll messages list when new messages arrive
  useEffect(() => {
    if (view === "messages" && msgListRef.current) {
      msgListRef.current.scrollTop = msgListRef.current.scrollHeight;
    }
  }, [messages, view]);

  // Clear unread badge when opening messages tab
  const openMessages = () => { setView("messages"); setUnread(0); };

  // ── localStorage setters (supervisor-local) ───────────────────────────────
  const UJ = u => { setJobs(u);   sv(K.j,  u); };
  const UC = u => { setChecks(u); sv(K.c,  u); };
  const US = u => { setSd(u);     sv(K.sd, u); };
  const UI = u => { setInv(u);    sv(K.inv,u); };

  // ── QC ────────────────────────────────────────────────────────────────────
  const [qcJob,        setQcJob]        = useState(null);
  const [qcType,       setQcType]       = useState("first-article");
  const [qcI,          setQcI]          = useState({});
  const [qcN,          setQcN]          = useState("");
  const [partChecks,   setPartChecks]   = useState({});
  const [expandedPart, setExpandedPart] = useState(null);

  // ── Job detail ────────────────────────────────────────────────────────────
  const [detailJob,   setDetailJob]   = useState(null);
  const [showAddPart, setShowAddPart] = useState(false);
  const [pf,          setPf]          = useState({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""});

  // ── Dashboard ─────────────────────────────────────────────────────────────
  const [showAJ, setShowAJ] = useState(false);
  const [nj,     setNj]     = useState({id:"",desc:"",type:"Base cabinet"});
  const [jobF,   setJobF]   = useState("all");
  const [csvData,setCsvData]= useState(null);
  const [colMap, setColMap] = useState({job:0,part:1,qty:-1,w:-1,h:-1,d:-1,mat:-1});

  // ── Missing parts (Supabase inventory_needs) ──────────────────────────────
  const [showAM, setShowAM] = useState(false);
  const [nm,     setNm]     = useState({jobId:"",part:"",qty:1,stage:"Cutting",notes:""});
  const [missF,  setMissF]  = useState("pending");

  // ── Standup ───────────────────────────────────────────────────────────────
  const [showSD, setShowSD] = useState(false);
  const [nsd,    setNsd]    = useState({date:today(),priorities:"",crew:"",issues:"",notes:""});

  // ── Inventory (local) ─────────────────────────────────────────────────────
  const [showAI, setShowAI] = useState(false);
  const [ni,     setNi]     = useState({name:"",unit:"sheets",qty:0,threshold:5});

  // ── Report ────────────────────────────────────────────────────────────────
  const [report, setReport] = useState("");
  const [copied, setCopied] = useState(false);

  // ── Toast ─────────────────────────────────────────────────────────────────
  const [toast, setToast] = useState(null);
  const showToastMsg = msg => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  // ── Crew management (Supabase device_tokens) ─────────────────────────────
  const [crewMembers,   setCrewMembers]   = useState([]);
  const [crewDeptEdits, setCrewDeptEdits] = useState({});
  const [crewLoading,   setCrewLoading]   = useState(false);
  const [crewSubView,   setCrewSubView]   = useState("devices");
  const [loginAudit,    setLoginAudit]    = useState([]);
  const [auditLoading,  setAuditLoading]  = useState(false);
  const [auditSearch,   setAuditSearch]   = useState("");

  // ── Time Clock (Supabase) ─────────────────────────────────────────────────
  const [tcToday,      setTcToday]      = useState([]);
  const [tcNow,        setTcNow]        = useState(Date.now()); // tick for live elapsed

  // ── SOPs (Supabase) ───────────────────────────────────────────────────────
  const [sops,         setSops]         = useState([]);
  const [sopViews,     setSopViews]     = useState([]);
  const [showSopModal, setShowSopModal] = useState(false);
  const [editSopId,    setEditSopId]    = useState(null);
  const defaultSopForm = { title:"", dept:"Assembly", description:"", steps:[{instruction:"",warning:""}], pdf_url:"" };
  const [sopForm,      setSopForm]      = useState(defaultSopForm);

  // ── Job actions ───────────────────────────────────────────────────────────
  const addJob = () => {
    if (!nj.id.trim()) return;
    UJ([{ uid:uid(), jobId:nj.id.trim(), desc:nj.desc.trim(), type:nj.type,
          status:"active", created:new Date().toISOString(), parts:[] }, ...jobs]);
    setNj({id:"",desc:"",type:"Base cabinet"}); setShowAJ(false);
  };

  const openDetail = job => {
    setDetailJob({...job}); setShowAddPart(false);
    setPf({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""});
    setView("job_detail");
  };

  // ── Part actions ──────────────────────────────────────────────────────────
  const addPart = () => {
    if (!pf.desc.trim()) return;
    const part = { uid:uid(), ...pf, qty:Number(pf.qty)||1 };
    const updJ = { ...detailJob, parts:[...(detailJob.parts||[]), part] };
    setDetailJob(updJ);
    UJ(jobs.map(j => j.uid === detailJob.uid ? updJ : j));
    setPf({partNum:"",desc:"",qty:1,width:"",height:"",depth:"",material:""}); setShowAddPart(false);
  };

  const delPart = puid => {
    const updJ = { ...detailJob, parts:(detailJob.parts||[]).filter(p => p.uid !== puid) };
    setDetailJob(updJ);
    UJ(jobs.map(j => j.uid === detailJob.uid ? updJ : j));
  };

  // ── QC actions ────────────────────────────────────────────────────────────
  const startCheck = job => {
    setQcJob(job); setQcI({}); setQcN(""); setPartChecks({}); setExpandedPart(null);
    setQcType("first-article"); setView("check");
  };

  const togglePart = puid =>
    setPartChecks(p => ({ ...p, [puid]:{ ...p[puid], checked:!p[puid]?.checked } }));

  const setPartNote = (puid, note) =>
    setPartChecks(p => ({ ...p, [puid]:{ ...p[puid], note } }));

  const submitCheck = async () => {
    const items = CL.map(i => ({ ...i, passed:qcI[i.id]===true, failed:qcI[i.id]===false }));
    const parts = qcJob.parts || [];
    const anyFail = items.some(i => i.failed);
    const allPass = items.every(i => i.passed);
    const partsOk = parts.length === 0 || parts.every(p => partChecks[p.uid]?.checked);
    const hasNotes = parts.some(p => partChecks[p.uid]?.note?.trim());
    const result = (anyFail || (!partsOk && parts.length > 0)) ? "fail"
                 : (allPass && partsOk && !hasNotes)           ? "pass" : "partial";

    // Save locally
    UC([{ uid:uid(), jobUid:qcJob.uid, jobId:qcJob.jobId, type:qcType, items,
          partResults:partChecks, partsTotal:parts.length,
          partsVerified:parts.filter(p => partChecks[p.uid]?.checked).length,
          notes:qcN, result, timestamp:new Date().toISOString() }, ...checks]);
    UJ(jobs.map(j => j.uid === qcJob.uid
      ? { ...j, status: result==="fail"?"flagged" : result==="pass"?"passed" : j.status }
      : j));

    // Write QC result to Supabase messages so crew sees it
    const emoji = result === "pass" ? "✅" : result === "fail" ? "❌" : "⚠️";
    const body = `${emoji} QC ${result.toUpperCase()} — Job #${qcJob.jobId} (${qcType})` +
      (qcN ? `\n${qcN}` : "") +
      (parts.length > 0 ? `\nParts verified: ${parts.filter(p=>partChecks[p.uid]?.checked).length}/${parts.length}` : "");
    await sb.from("messages").insert({ sender_name:"Supervisor", dept:"QC", body });

    // AI auto-capture — log this QC check as a learning data point
    const _now = new Date();
    try {
      await sb.from("ai_learning_log").insert({
        job_id:          qcJob.jobId,
        job_type:        qcJob.type,

      sender_name: "Supervisor",
      dept:        "Management",
      body:        trimmed,
    };
    const optimistic = { id:"opt-"+Date.now(), ...payload, created_at:new Date().toISOString() };

    // Clear input and show optimistic message immediately
    setMsgBody("");
    setMessages(p => [...p, optimistic]);
    setSending(true);

    try {
      const { data, error } = await sb.from("messages").insert(payload).select().single();
      if (error) {
        console.error("[sendMessage] insert failed:", error.message, error.code, error.details);
        setMessages(p => p.filter(m => m.id !== optimistic.id));
      } else {
        // Remove the optimistic row, then add the confirmed row only if
        // real-time hasn't already inserted it (avoids duplicates when the
        // realtime event races ahead of the insert response).
        setMessages(p => {
          const without = p.filter(m => m.id !== optimistic.id);
          if (without.some(m => m.id === data.id)) return without;
          return [...without, data];
        });
      }
    } catch(err) {
      console.error("[sendMessage] unexpected error:", err);
      setMessages(p => p.filter(m => m.id !== optimistic.id));

      const all = lines.slice(1).map(l => l.split(",").map(c => c.trim().replace(/"/g,"")));
      const ji = headers.findIndex(h => /(^job$|job.?no|job.?num|wo\b|work.?order)/i.test(h));
      const pi = headers.findIndex(h => /(part|desc|cabinet|item|name|product|component)/i.test(h));
      const qi = headers.findIndex(h => /^(qty|quantity)$/i.test(h));
      const wi = headers.findIndex(h => /^(width|w|wd)$/i.test(h));
      const hi = headers.findIndex(h => /^(height|h|ht)$/i.test(h));
      const di = headers.findIndex(h => /^(depth|d|dp|length|len)$/i.test(h));
      const mi = headers.findIndex(h => /(mat|material|species|finish)/i.test(h));
      setColMap({ job:ji>=0?ji:0, part:pi>=0?pi:1, qty:qi>=0?qi:-1, w:wi>=0?wi:-1, h:hi>=0?hi:-1, d:di>=0?di:-1, mat:mi>=0?mi:-1 });

              h("span",{style:{fontSize:12,color:"#444"}}, i.unit+"  /  min: "+i.threshold)
            )
          ),
          h("button",{className:"bd",onClick:()=>UI(inv.filter(x=>x.uid!==i.uid)),style:{flexShrink:0,padding:"7px 10px"}}, "✕")
        );
      })
    ),

    // ── MESSAGES (threaded) ───────────────────────────────────────────────────
    view==="messages" && (() => {
      // Build thread list: unique crew senders, sorted by most recent message
      const threadMap = {};
      messages.forEach(m => {
        const key = m.sender_name;
        if (m.sender_name === "Supervisor") return; // skip outgoing
        if (!threadMap[key]) threadMap[key] = { name: m.sender_name, dept: m.dept, messages: [], lastTime: m.created_at };
        threadMap[key].messages.push(m);
        if (m.created_at > threadMap[key].lastTime) threadMap[key].lastTime = m.created_at;
      });
      const threads = Object.values(threadMap).sort((a,b) => b.lastTime.localeCompare(a.lastTime));

      // Messages visible in the active thread.
      // Without a to_name column, show all messages from this crew member
      // plus all supervisor messages (supervisor replies are shared context).
      const threadMsgs = activeThread
        ? messages
            .filter(m =>
              m.sender_name === activeThread.name ||
              m.sender_name === "Supervisor"
            )
            .sort((a,b) => a.created_at.localeCompare(b.created_at))
        : [];

      // Bubble row renderer
      const MsgRow = (m) => {
        const isOwn = m.sender_name === "Supervisor";
        return h("div",{
          key: m.id,
          style:{
            display:"flex", flexDirection:"column",
            alignItems: isOwn ? "flex-end" : "flex-start",
            alignSelf:  isOwn ? "flex-end" : "flex-start",
            maxWidth:"72%", marginBottom:12,
          }
        },
          !isOwn && h("div",{style:{fontSize:10,color:"#555",marginBottom:3,marginLeft:2}},
            m.sender_name + (m.dept ? " · "+m.dept : "")
          ),
          h("div",{ className: isOwn ? "bubble-out" : "bubble-in" },
            h("span",{style:{fontSize:13,color:isOwn?"#1a0900":"#e5e5e5",whiteSpace:"pre-wrap",lineHeight:1.5}}, m.body)
          ),
          h("div",{style:{fontSize:10,color:"#444",marginTop:3}},
            new Date(m.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
          )
        );
      };

      // ── Thread list ──────────────────────────────────────────────────────
      if (!activeThread) return h("div", null,
        h("div",{style:{fontSize:11,color:"#444",marginBottom:14}},
          threads.length + " crew member" + (threads.length!==1?"s":"") + " · click a name to open their conversation"
        ),
        threads.length === 0 && h(Empty,{msg:"No crew messages yet."}),
        threads.map(t => {
          const last = t.messages[t.messages.length-1];
          const replyCount = messages.filter(m => m.sender_name==="Supervisor" && new Date(m.created_at) >= new Date(t.messages[0]?.created_at)).length;
          return h("div",{
            key: t.name,
            onClick: ()=>{ setActiveThread({name:t.name,dept:t.dept}); setUnread(0); },
            style:{
              ...CS, cursor:"pointer", display:"flex", alignItems:"center",
              justifyContent:"space-between", gap:14,
              borderLeft:"3px solid "+AM,
              transition:"background .1s",
            },
            onMouseEnter: e=>e.currentTarget.style.background="#1a1a1a",
            onMouseLeave: e=>e.currentTarget.style.background=CS.background,
          },
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:5}},
                h("span",{style:{fontWeight:500,fontSize:14,color:AM}}, t.name),
                h("span",{style:{fontSize:10,color:"#555",background:"#1a1a1a",padding:"2px 8px",borderRadius:99,border:"1px solid #222"}}, t.dept),
                replyCount>0 && h("span",{style:{fontSize:10,color:"#4ade80"}}, replyCount+" repl"+(replyCount===1?"y":"ies"))
              ),
              last && h("div",{style:{fontSize:12,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
                last.body
              )
            ),
            h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}},
              h("span",{style:{fontSize:10,color:"#444"}},
                new Date(t.lastTime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
              ),
              h("span",{style:{fontSize:10,color:"#555"}}, t.messages.length+" msg"+(t.messages.length!==1?"s":"")),
              h("span",{style:{fontSize:11,color:"#666"}}, "→")
            )
          );
        })
      );

      // ── Individual thread conversation ───────────────────────────────────
      return h("div", null,
        // Thread header
        h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14,paddingBottom:12,borderBottom:"1px solid #1a1a1a"}},
          h("button",{onClick:()=>{ setActiveThread(null); setMsgBody(""); }}, "← all conversations"),
          h("span",{style:{fontWeight:500,color:AM,fontSize:15}}, activeThread.name),
          h("span",{style:{fontSize:11,color:"#555",background:"#1a1a1a",padding:"2px 8px",borderRadius:99,border:"1px solid #222"}}, activeThread.dept)
        ),
        // Message list
        h("div",{
          ref: msgListRef,
          style:{
            height:400, overflowY:"auto", background:"#0d0d0d", borderRadius:8,
            border:"1px solid #1a1a1a", padding:"16px", marginBottom:12,
            display:"flex", flexDirection:"column",
          }
        },
          threadMsgs.length===0
            ? h(Empty,{msg:"No messages in this thread yet."})
            : threadMsgs.map(MsgRow)
        ),
        // Compose
        h("div",{style:{display:"flex",gap:10,alignItems:"flex-end"}},
          h("textarea",{
            placeholder:`Reply to ${activeThread.name}…`,
            value:msgBody,
            onChange:e=>setMsgBody(e.target.value),
            onKeyDown:e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)) sendMessage(); },
            rows:2,
            style:{...IS,flex:1,resize:"none"},
          }),
          h("button",{
            className:"bp",
            onClick:sendMessage,
            disabled:!msgBody.trim()||sending,
            style:{padding:"10px 18px",opacity:(!msgBody.trim()||sending)?0.4:1,flexShrink:0},
          }, sending?"…":"send")
        ),
        h("div",{style:{fontSize:10,color:"#333",marginTop:6}}, "Cmd/Ctrl+Enter to send · only "+activeThread.name+" sees this reply")
      );
    })(),

    // ── REPORT ────────────────────────────────────────────────────────────────
    view==="report" && (() => {
      const activeTc = tcToday.filter(e => !e.clock_out || e.clock_out === "NULL");
      const tcTotalHours = tcToday.reduce((sum, e) => {
        if (e.clock_out) return sum + (e.total_hours || 0);
        return sum + (tcNow - new Date(e.clock_in).getTime()) / 3600000;
      }, 0);
      const deptHours = {};
      tcToday.forEach(e => {
        const h = e.clock_out ? (e.total_hours || 0) : (tcNow - new Date(e.clock_in).getTime()) / 3600000;
        deptHours[e.dept] = (deptHours[e.dept] || 0) + h;
      });
      const fmtT = iso => new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      const fmtElapsed = isoStart => {
        const diff = Math.floor((tcNow - new Date(isoStart).getTime()) / 1000);
        const hh = Math.floor(diff / 3600), mm = Math.floor((diff % 3600) / 60);
        return hh > 0 ? `${hh}h ${mm}m` : `${mm}m`;
      };

      return h("div", null,
        // ── Time Clock section ────────────────────────────────────────
        h(Divider, {label:"TIME CLOCK — TODAY"}),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:10,marginBottom:16}},
          h(Stat,{label:"clocked in now",  val:activeTc.length,              color:"#22c55e"}),
          h(Stat,{label:"sessions today",  val:tcToday.length,               color:"#3b82f6"}),
          h(Stat,{label:"total labor hrs", val:tcTotalHours.toFixed(1)+"h",  color:AM})
        ),

        // Currently clocked in
        activeTc.length > 0 && h("div",{style:{marginBottom:14}},
          h("div",{style:{fontSize:10,color:"#555",marginBottom:8,letterSpacing:".08em"}},"CURRENTLY CLOCKED IN"),
          activeTc.map(e => h("div",{key:e.id,style:{...CS,borderLeft:"3px solid #22c55e",display:"flex",alignItems:"center",justifyContent:"space-between"}},
            h("div",null,
              h("span",{style:{fontWeight:500,color:"#e5e5e5",fontSize:14}}, e.worker_name),
              h("span",{style:{fontSize:11,color:"#555",marginLeft:10,background:"#1a1a1a",padding:"2px 8px",borderRadius:99,border:"1px solid #222"}}, e.dept)
            ),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontSize:12,color:"#22c55e",fontWeight:500}}, "since "+fmtT(e.clock_in)),
              h("div",{style:{fontSize:11,color:"#555",marginTop:2}}, fmtElapsed(e.clock_in)+" elapsed")
            )
          ))
        ),

        // Today's full log
        tcToday.length > 0 && h("div",{style:{marginBottom:14}},
          h("div",{style:{fontSize:10,color:"#555",marginBottom:8,letterSpacing:".08em"}},"TODAY'S CLOCK LOG"),
          h("div",{style:{background:"#0d0d0d",borderRadius:8,border:"1px solid #1a1a1a",overflow:"hidden"}},
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 100px 80px 80px 60px",padding:"8px 14px",borderBottom:"1px solid #1a1a1a",fontSize:10,color:"#444",letterSpacing:".06em"}},
              h("span",null,"CREW"), h("span",null,"DEPT"), h("span",null,"IN"), h("span",null,"OUT"), h("span",null,"HRS")
            ),
            tcToday.map(e => {
              const hrs = e.clock_out ? (e.total_hours||0) : (tcNow - new Date(e.clock_in).getTime()) / 3600000;
              return h("div",{key:e.id,style:{display:"grid",gridTemplateColumns:"1fr 100px 80px 80px 60px",padding:"8px 14px",borderBottom:"1px solid #111",fontSize:12,alignItems:"center"}},
                h("span",{style:{color:"#e5e5e5",fontWeight:500}}, e.worker_name),
                h("span",{style:{color:"#555"}}, e.dept),
                h("span",{style:{color:"#888"}}, fmtT(e.clock_in)),
                h("span",{style:{color:e.clock_out?"#888":"#22c55e"}}, e.clock_out ? fmtT(e.clock_out) : "active"),
                h("span",{style:{color:AM,fontWeight:500}}, hrs.toFixed(1)+"h")
              );
            })
          )
        ),

        // Hours by department
        Object.keys(deptHours).length > 0 && h("div",{style:{marginBottom:20}},
          h("div",{style:{fontSize:10,color:"#555",marginBottom:8,letterSpacing:".08em"}},"LABOR HOURS BY DEPARTMENT"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
            Object.entries(deptHours).sort((a,b)=>b[1]-a[1]).map(([dept,hrs]) =>
              h("div",{key:dept,style:{background:"#141414",borderRadius:8,border:"1px solid #222",padding:"10px 16px",minWidth:110}},
                h("div",{style:{fontSize:20,fontWeight:500,color:AM}}, hrs.toFixed(1)+"h"),
                h("div",{style:{fontSize:10,color:"#555",marginTop:3,letterSpacing:".04em"}}, dept)
              )
            )
          )
        ),

        // ── Damage & Resolution Log ───────────────────────────────────
        h(Divider, {label:"DAMAGE & RESOLUTION LOG"}),
        (() => {
          const resolved = damageRpts.filter(d => d.status === "resolved");
          const unresolved = damageRpts.filter(d => d.status !== "resolved");
          const resTypeCount = {};
          resolved.forEach(d => { resTypeCount[d.resolution_type] = (resTypeCount[d.resolution_type]||0) + 1; });
          return h("div", null,
            // Summary stats
            h("div",{style:{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}},
              h("div",{style:{background:"#141414",borderRadius:6,padding:"10px 14px",borderTop:"3px solid #ef4444"}},
                h("div",{style:{fontSize:20,fontWeight:500,color:"#ef4444"}}, damageRpts.length),
                h("div",{style:{fontSize:10,color:"#555",marginTop:3,letterSpacing:".06em"}}, "TOTAL REPORTS")
              ),
              h("div",{style:{background:"#141414",borderRadius:6,padding:"10px 14px",borderTop:"3px solid #f59e0b"}},
                h("div",{style:{fontSize:20,fontWeight:500,color:"#f59e0b"}}, unresolved.length),
                h("div",{style:{fontSize:10,color:"#555",marginTop:3,letterSpacing:".06em"}}, "UNRESOLVED")
              ),
              h("div",{style:{background:"#141414",borderRadius:6,padding:"10px 14px",borderTop:"3px solid #22c55e"}},
                h("div",{style:{fontSize:20,fontWeight:500,color:"#22c55e"}}, resolved.length),
                h("div",{style:{fontSize:10,color:"#555",marginTop:3,letterSpacing:".06em"}}, "RESOLVED")
              ),
              Object.keys(resTypeCount).length > 0 && h("div",{style:{background:"#141414",borderRadius:6,padding:"10px 14px",flex:1,minWidth:180}},
                h("div",{style:{fontSize:10,color:"#555",marginBottom:6,letterSpacing:".06em"}}, "RESOLUTION BREAKDOWN"),
                h("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
                  Object.entries(resTypeCount).sort((a,b)=>b[1]-a[1]).map(([t,n]) =>
                    h("span",{key:t,style:{fontSize:10,background:(RES_COLORS[t]||"#555")+"20",color:RES_COLORS[t]||"#aaa",padding:"2px 8px",borderRadius:99,border:`1px solid ${(RES_COLORS[t]||"#555")}40`}}, t+": "+n)
                  )
                )
              )
            ),
            // Unresolved flagged
            unresolved.length > 0 && h("div",{style:{marginBottom:16}},
              h("div",{style:{fontSize:10,color:"#ef4444",marginBottom:8,letterSpacing:".08em"}}, "⚠ UNRESOLVED DAMAGE REPORTS"),
              unresolved.map(d => h("div",{key:d.id,style:{background:"#1f0a0a",borderRadius:6,border:"1px solid #450a0a",borderLeft:"3px solid #ef4444",padding:"8px 12px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}},
                h("div",null,
                  h("span",{style:{color:AM,fontWeight:500,fontSize:12}}, "#"+(d.job_id||"—")+" "),
                  h("span",{style:{color:"#ccc",fontSize:13}}, d.part_name),
                  h("span",{style:{fontSize:11,color:"#555",marginLeft:8}}, d.dept)
                ),
                h("span",{style:{fontSize:10,color:"#f87171",background:"#2e1a1a",padding:"2px 8px",borderRadius:99}}, d.status.toUpperCase())
              ))
            ),
            // Resolved table
            resolved.length > 0 && h("div",null,
              h("div",{style:{fontSize:10,color:"#555",marginBottom:8,letterSpacing:".08em"}}, "RESOLVED REPORTS"),
              h("div",{style:{background:"#0d0d0d",borderRadius:8,border:"1px solid #1a1a1a",overflow:"auto"}},
                h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
                  h("thead",null,
                    h("tr",{style:{borderBottom:"1px solid #1a1a1a"}},
                      ["JOB","PART","DEPT","RESOLUTION","NOTES","RESOLVED BY","DATE"].map(col =>
                        h("th",{key:col,style:{padding:"8px 12px",color:"#444",fontWeight:500,letterSpacing:".06em",textAlign:"left",whiteSpace:"nowrap"}}, col)
                      )
                    )
                  ),
                  h("tbody",null,
                    resolved.map(d => {
                      const rc = RES_COLORS[d.resolution_type] || "#6b7280";
                      return h("tr",{key:d.id,style:{borderBottom:"1px solid #111"}},
                        h("td",{style:{padding:"8px 12px",color:AM}}, "#"+(d.job_id||"—")),
                        h("td",{style:{padding:"8px 12px",color:"#ccc"}}, d.part_name),
                        h("td",{style:{padding:"8px 12px",color:"#555"}}, d.dept),
                        h("td",{style:{padding:"8px 12px"}}, h("span",{style:{fontSize:10,background:rc+"20",color:rc,padding:"2px 8px",borderRadius:99,border:`1px solid ${rc}40`,whiteSpace:"nowrap"}}, d.resolution_type||"—")),
                        h("td",{style:{padding:"8px 12px",color:"#666",fontStyle:"italic",maxWidth:200}}, d.resolution_notes||"—"),
                        h("td",{style:{padding:"8px 12px",color:"#555"}}, d.resolved_by||"—"),
                        h("td",{style:{padding:"8px 12px",color:"#444",whiteSpace:"nowrap"}}, d.resolved_at ? fmtD(d.resolved_at) : "—")
                      );
                    })
                  )
                )
              )
            )
          );
        })(),

        // ── Text report ───────────────────────────────────────────────
        h(Divider, {label:"WEEKLY TEXT REPORT"}),
        h("div",{style:{marginBottom:12,fontSize:12,color:"#444"}}, "Plain-text weekly summary — paste into a message or email."),
        h("div",{style:{display:"flex",gap:8,marginBottom:14}},
          h("button",{className:"bp",onClick:genReport}, "generate report"),
          report && h("button",{onClick:copyReport,style:{color:copied?"#4ade80":"#aaa",borderColor:copied?"#14532d":"#1e1e1e"}}, copied?"copied ✓":"copy to clipboard")
        ),
        report && h("textarea",{value:report,readOnly:true,rows:26,style:{...IS,fontSize:12,color:"#666",lineHeight:1.7,resize:"none",background:"#0d0d0d",border:"1px solid #1a1a1a"}})
      );
    })(),

    // ── CREW MANAGEMENT ───────────────────────────────────────────────────────
    view==="crew" && h("div", null,
      // Sub-tab switcher
      h("div",{style:{display:"flex",gap:6,marginBottom:16}},
        h("button",{
          onClick:()=>setCrewSubView("devices"),
          style:{fontSize:11,padding:"6px 14px",background:crewSubView==="devices"?AM:"transparent",color:crewSubView==="devices"?"#1a0900":"#666",borderColor:crewSubView==="devices"?AM:"#1e1e1e"},
        }, "Devices"),
        h("button",{
          onClick:()=>{ setCrewSubView("audit"); if(loginAudit.length===0) loadLoginAudit(); },
          style:{fontSize:11,padding:"6px 14px",background:crewSubView==="audit"?AM:"transparent",color:crewSubView==="audit"?"#1a0900":"#666",borderColor:crewSubView==="audit"?AM:"#1e1e1e"},
        }, "Login Audit")
      ),

      // ── Devices sub-view ────────────────────────────────────────────────────
      crewSubView==="devices" && h("div", null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
          h("div",{style:{fontSize:11,color:"#444"}},
            crewMembers.length+" device"+(crewMembers.length!==1?"s":"")+" registered — change a department and click update"
          ),
          h("button",{onClick:loadCrewMembers,style:{fontSize:11}}, crewLoading?"loading…":"↺ refresh")
        ),
        crewLoading && h("div",{style:{textAlign:"center",padding:"48px 0",color:"#444",fontSize:13}}, "Loading…"),
        !crewLoading && crewMembers.length===0 && h(Empty,{msg:"No crew devices registered yet. Crew members appear here after they first log into the app."}),
        !crewLoading && crewMembers.map(m => {
          const pendingDept  = crewDeptEdits[m.id];
          const selectedDept = pendingDept !== undefined ? pendingDept : (m.dept || "");
          const changed      = selectedDept !== (m.dept || "");
          return h("div",{key:m.id,style:{...CS,display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}},
            h("div",{style:{flex:1}},
              h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}},
                h("span",{style:{fontWeight:500,fontSize:14,color:"#e5e5e5"}}, m.name||"(unnamed)"),
                h(Pill,{label:m.dept||"—",color:"#3b82f6"})
              )
            ),
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("select",{
                value:    selectedDept,
                onChange: e => setCrewDeptEdits(p => ({...p,[m.id]:e.target.value})),
                style:    {...IS, width:170},
              }, CREW_DEPTS.map(d => h("option",{key:d,value:d},d))),
              h("button",{
                className: changed ? "bp" : "",
                disabled:  !changed,
                onClick:   () => updateCrewDept(m.id, selectedDept),
                style:     {opacity: changed ? 1 : 0.3, whiteSpace:"nowrap"},
              }, "update")
            )
          );
        })
      ),

      // ── Login Audit sub-view ────────────────────────────────────────────────
      crewSubView==="audit" && h("div", null,
        h("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:14,flexWrap:"wrap"}},
          h("input",{
            placeholder:"Search name or dept…",
            value:auditSearch,
            onChange:e=>setAuditSearch(e.target.value),
            style:{...IS,maxWidth:240,padding:"6px 12px"},
          }),
          h("button",{onClick:loadLoginAudit,style:{fontSize:11}}, auditLoading?"loading…":"↺ refresh"),
          loginAudit.length>0 && h("button",{onClick:exportAuditCSV,style:{fontSize:11,color:"#4ade80",borderColor:"#14532d"}}, "↓ export csv"),
          h("div",{style:{fontSize:11,color:"#444",marginLeft:"auto"}},
            "last 50 logins · blue = supervisor · ⚠ = multi-dept · 🌙 = off-hours"
          )
        ),
        auditLoading && h("div",{style:{textAlign:"center",padding:"48px 0",color:"#444",fontSize:13}}, "Loading…"),
        !auditLoading && loginAudit.length===0 && h(Empty,{msg:"No login records yet. Records appear after crew or supervisors log in."}),
        !auditLoading && (() => {
          const q = auditSearch.toLowerCase();
          const filtered = loginAudit.filter(r =>
            !q || r.worker_name.toLowerCase().includes(q) || (r.dept||"").toLowerCase().includes(q)
          );
          // Detect multi-dept workers (same name, different depts in audit window)
          const workerDepts = {};
          loginAudit.forEach(r => {
            if (!workerDepts[r.worker_name]) workerDepts[r.worker_name] = new Set();
            workerDepts[r.worker_name].add(r.dept||"");
          });
          return filtered.map(r => {
            const isSup    = r.role === "supervisor";
            const isOffHrs = (() => { const h2 = new Date(r.logged_in_at).getHours(); return h2 < 6 || h2 >= 22; })();
            const multiDep = (workerDepts[r.worker_name]?.size || 0) > 1;
            return h("div",{key:r.id,style:{
              ...CS,
              borderLeft:"3px solid "+(isSup?"#3b82f6":"#2a2a2a"),
              display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap",
            }},
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}},
                  h("span",{style:{fontWeight:500,fontSize:13,color:isSup?"#60a5fa":"#e5e5e5"}}, r.worker_name),
                  h(Pill,{label:r.role,color:isSup?"#3b82f6":"#22c55e"}),
                  r.dept && h(Pill,{label:r.dept,color:"#555"}),
                  multiDep && h("span",{style:{fontSize:11,color:"#f59e0b"}}, "⚠ multi-dept"),
                  isOffHrs && h("span",{style:{fontSize:11,color:"#818cf8"}}, "🌙 off-hours")
                ),
                h("div",{style:{fontSize:11,color:"#444"}},
                  fmtDT(r.logged_in_at) + (r.device_id ? "  ·  " + r.device_id.slice(0,18) + "…" : "")
                )
              )
            );
          });
        })()
      )
    ),

    // ── SOPs ──────────────────────────────────────────────────────────────────
    view==="sops" && h("div", null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("div",{style:{fontSize:11,color:"#444"}}, sops.length+" procedure"+(sops.length!==1?"s":"")+" defined"),
        h("button",{className:"bp",onClick:()=>{setSopForm(defaultSopForm);setEditSopId(null);setShowSopModal(true)}}, "+ add sop")
      ),
      sops.length===0 && h(Empty,{msg:"No SOPs yet. Add one above."}),
      ...Object.entries(
        sops.reduce((acc,sop)=>{ (acc[sop.dept]=acc[sop.dept]||[]).push(sop); return acc; },{})
      ).sort(([a],[b])=>a.localeCompare(b)).map(([dept,deptSops]) =>
        h("div",{key:dept},
          h(Divider,{label:dept.toUpperCase()}),
          deptSops.map(sop => {
            const uniqueViewers = new Set(sopViews.filter(v=>v.sop_id===sop.id).map(v=>v.viewer_name)).size;
            return h("div",{key:sop.id,style:{...CS,borderLeft:"3px solid #f59e0b",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}},
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}},
                  h("span",{style:{fontWeight:500,fontSize:14,color:"#e5e5e5"}}, sop.title),
                  h(Pill,{label:sop.dept,color:"#f59e0b"}),
                  sop.pdf_url && h(Pill,{label:"PDF",color:"#3b82f6"})
                ),
                sop.description && h("div",{style:{fontSize:12,color:"#666",marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:500}}, sop.description),
                h("div",{style:{display:"flex",alignItems:"center",gap:16,fontSize:11,color:"#444",flexWrap:"wrap"}},
                  h("span",null, (sop.steps||[]).length+" step"+(sop.steps?.length!==1?"s":"")),
                  h("span",null, "updated "+fmtD(sop.updated_at)),
                  uniqueViewers>0 && h("span",{style:{color:"#4ade80"}}, uniqueViewers+" crew member"+(uniqueViewers!==1?"s":"")+" viewed")
                )
              ),
              h("div",{style:{display:"flex",gap:6,flexShrink:0}},
                h("button",{style:{color:"#60a5fa",borderColor:"#1e3a5f"},onClick:()=>{
                  setSopForm({
                    title:       sop.title,
                    dept:        sop.dept,
                    description: sop.description||"",
                    steps:       (sop.steps&&sop.steps.length ? sop.steps : [{instruction:"",warning:""}]).map(st=>({instruction:st.instruction,warning:st.warning||""})),
                    pdf_url:     sop.pdf_url||"",
                  });
                  setEditSopId(sop.id);
                  setShowSopModal(true);
                }}, "edit"),
                h("button",{className:"bd",onClick:()=>deleteSop(sop.id),style:{padding:"7px 10px"}}, "✕")
              )
            );
          })
        )
      ),

      // SOP modal
      showSopModal && h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"40px 16px"}},
        h("div",{style:{background:"#141414",borderRadius:10,border:"1px solid #2a2a2a",width:"100%",maxWidth:640,padding:24,marginBottom:40}},
          h("div",{style:{fontSize:14,fontWeight:500,color:"#e5e5e5",marginBottom:18}}, editSopId?"edit sop":"new sop"),
          h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,marginBottom:10}},
            h("input",{placeholder:"Title",value:sopForm.title,onChange:e=>setSopForm(p=>({...p,title:e.target.value})),style:IS,autoFocus:!editSopId}),
            h("select",{value:sopForm.dept,onChange:e=>setSopForm(p=>({...p,dept:e.target.value})),style:IS},
              ["All","Cutting","Edgebanding","Assembly","Finishing","Craftsman","Install"].map(d=>h("option",{key:d,value:d},d))
            )
          ),
          h("textarea",{placeholder:"Short description (optional)",value:sopForm.description,onChange:e=>setSopForm(p=>({...p,description:e.target.value})),rows:2,style:{...IS,marginBottom:10,resize:"vertical"}}),
          h("input",{placeholder:"PDF URL (optional)",value:sopForm.pdf_url,onChange:e=>setSopForm(p=>({...p,pdf_url:e.target.value})),style:{...IS,marginBottom:18}}),
          h("div",{style:{fontSize:10,color:"#555",letterSpacing:".08em",marginBottom:10}}, "STEPS"),
          ...sopForm.steps.map((step,idx)=>
            h("div",{key:idx,style:{background:"#111",borderRadius:6,border:"1px solid #1e1e1e",padding:"10px 12px",marginBottom:8}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:8}},
                h("span",{style:{fontSize:11,color:"#555",minWidth:22,fontWeight:500,fontFamily:"'DM Mono',monospace"}}, String(idx+1).padStart(2,"0")),
                h("button",{
                  onClick:()=>setSopForm(p=>{const st=p.steps.filter((_,i)=>i!==idx);return {...p,steps:st.length?st:[{instruction:"",warning:""}]};}),
                  style:{marginLeft:"auto",fontSize:10,padding:"2px 8px",color:"#f87171",borderColor:"#7f1d1d"}
                }, "remove")
              ),
              h("textarea",{
                placeholder:"What should the crew do?",
                value:step.instruction,
                onChange:e=>{const st=[...sopForm.steps];st[idx]={...st[idx],instruction:e.target.value};setSopForm(p=>({...p,steps:st}));},
                rows:2,
                style:{...IS,marginBottom:7,resize:"vertical",fontSize:12}
              }),
              h("input",{
                placeholder:"⚠  Warning or caution (optional)",
                value:step.warning||"",
                onChange:e=>{const st=[...sopForm.steps];st[idx]={...st[idx],warning:e.target.value};setSopForm(p=>({...p,steps:st}));},
                style:{...IS,fontSize:12}
              })
            )
          ),
          h("button",{
            onClick:()=>setSopForm(p=>({...p,steps:[...p.steps,{instruction:"",warning:""}]})),
            style:{fontSize:11,color:"#f59e0b",borderColor:"#78350f",marginBottom:18,display:"block"}
          }, "+ add step"),
          h("div",{style:{display:"flex",gap:8}},
            h("button",{className:"bp",onClick:saveSop}, editSopId?"save changes":"create sop"),
            h("button",{onClick:()=>setShowSopModal(false)}, "cancel")
          )
        )
      )
    ),

    // Toast
    toast && h("div",{className:"toast"}, toast),

    // Resolve damage modal
    resolveModal && h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}},
      h("div",{style:{background:"#141414",border:"1px solid #333",borderRadius:12,padding:24,width:480,maxWidth:"calc(100vw - 48px)"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,paddingBottom:12,borderBottom:"1px solid #222"}},
          h("div",null,
            h("div",{style:{fontSize:14,fontWeight:500,color:"#e5e5e5"}}, "Resolve — "+resolveModal.part_name),
            resolveModal.job_id && h("div",{style:{fontSize:11,color:"#555",marginTop:3}}, "Job #"+resolveModal.job_id+
              (resolveModal.dept ? "  ·  "+resolveModal.dept : ""))
          ),
          h("button",{onClick:()=>setResolveModal(null),style:{padding:"4px 10px",fontSize:12}}, "✕")
        ),
        h("div",{style:{marginBottom:14}},
          h("div",{style:{fontSize:10,color:"#555",letterSpacing:".08em",marginBottom:8}}, "RESOLUTION TYPE"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
            RESOLUTION_TYPES_WEB.map(t =>
              h("button",{key:t,onClick:()=>setResType(t),style:{fontSize:11,padding:"6px 14px",background:resType===t?AM:"transparent",color:resType===t?"#1a0900":"#666",borderColor:resType===t?AM:"#1e1e1e",fontWeight:resType===t?500:400}}, t)
            )
          )
        ),
        h("div",{style:{marginBottom:14}},
          h("div",{style:{fontSize:10,color:"#555",letterSpacing:".08em",marginBottom:6}}, "NOTES (OPTIONAL)"),
          h("textarea",{value:resNotes,onChange:e=>setResNotes(e.target.value),placeholder:"Additional details...",rows:3,style:{...IS,fontSize:12}})
        ),
        h("div",{style:{marginBottom:20}},
          h("div",{style:{fontSize:10,color:"#555",letterSpacing:".08em",marginBottom:6}}, "RESOLVED BY"),
          h("input",{type:"text",value:resBy,onChange:e=>setResBy(e.target.value),placeholder:"Supervisor name",style:IS})
        ),
        h("div",{style:{display:"flex",gap:10}},
          h("button",{className:"bp",onClick:submitResolution,disabled:resolving,style:{opacity:resolving?0.5:1}}, resolving?"saving…":"save resolution"),
          h("button",{onClick:()=>setResolveModal(null)}, "cancel")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
